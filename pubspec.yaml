name: storyblocks
description: "StoryBlocks - Construisez vos histoires bloc par bloc."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  share_plus: ^10.1.2
  uuid: ^4.4.0
  intl: ^0.19.0
  flutter_staggered_animations: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logosb.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
